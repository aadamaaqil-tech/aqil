<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Integration Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex flex-col overflow-hidden">

    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold text-indigo-400 flex items-center gap-2">
            <span>∫</span> Visual Integration Calculator
        </h1>
        <p class="text-xs text-gray-400">Scroll to Zoom | Drag to Pan</p>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <div class="w-full md:w-96 bg-gray-800 p-6 flex flex-col gap-6 border-r border-gray-700 overflow-y-auto shadow-lg z-10">
            
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Function f(x)</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-gray-500 font-serif text-lg">f(x) =</span>
                    <input type="text" id="funcInput" value="x^2 - 2x" 
                        class="w-full bg-gray-950 border border-gray-700 rounded-lg pl-16 pr-4 py-2 text-indigo-300 font-mono text-lg focus:outline-none focus:border-indigo-500 transition">
                </div>
                <p id="errorMsg" class="text-xs text-red-400 mt-1 hidden">Invalid expression</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-1">Lower Bound (a)</label>
                    <input type="number" id="boundA" value="0" step="0.5"
                        class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-center font-mono focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-1">Upper Bound (b)</label>
                    <input type="number" id="boundB" value="3" step="0.5"
                        class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-center font-mono focus:outline-none focus:border-indigo-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1 flex justify-between">
                    <span>Approximation Intervals (n)</span>
                    <span id="intervalsVal" class="text-indigo-400 font-mono">100</span>
                </label>
                <input type="range" id="intervals" min="10" max="1000" step="10" value="100" 
                    class="w-full accent-indigo-500 bg-gray-700 h-2 rounded-lg cursor-pointer">
            </div>

            <div class="mt-4 bg-gray-950 rounded-xl p-4 border border-gray-700 flex flex-col gap-3">
                <div class="text-sm font-medium text-gray-400 uppercase tracking-wider">Definite Integral Result</div>
                <div class="text-3xl font-mono text-emerald-400 font-bold overflow-x-auto whitespace-nowrap py-1">
                    <span class="text-xl font-serif text-gray-500 mr-1">⌥₀³ f(x)dx =</span>
                    <span id="resultDisplay">0.000</span>
                </div>
            </div>

            <div class="mt-auto text-xs text-gray-500 space-y-1 border-t border-gray-700 pt-4">
                <p>💡 Supported syntax: <code class="text-gray-400">x^2</code>, <code class="text-gray-400">sin(x)</code>, <code class="text-gray-400">sqrt(x)</code>, <code class="text-gray-400">exp(x)</code></p>
                <p>🔄 Click and drag grid canvas directly to explore coordinates.</p>
            </div>
        </div>

        <div class="flex-1 h-full relative bg-gray-950">
            <canvas id="graphCanvas" class="w-full h-full block cursor-grab active:cursor-grabbing"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');

        // Inputs & Controls Elements
        const funcInput = document.getElementById('funcInput');
        const boundAInput = document.getElementById('boundA');
        const boundBInput = document.getElementById('boundB');
        const intervalsInput = document.getElementById('intervals');
        const intervalsVal = document.getElementById('intervalsVal');
        const resultDisplay = document.getElementById('resultDisplay');
        const errorMsg = document.getElementById('errorMsg');

        // Canvas View State (Pan and Zoom tracking)
        let config = {
            scaleX: 40,   // Pixels per unit unit along X
            scaleY: 40,   // Pixels per unit unit along Y
            offsetX: 0,   // Grid center offset from Canvas center (Pixels)
            offsetY: 0,
        };

        // Initialize Canvas Positioning
